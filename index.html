<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Satsang Planner</title>

<style>

body {
    font-family: 'Segoe UI', Arial;
    margin: 0;
    background: #f4f7f6;
}

/* HEADER */
.header {
    background: #ffffff;
    text-align: center;
    padding: 15px;
    border-bottom: 2px solid #ddd;
}

.header img {
    height: 60px;
}

.header h1 {
    margin: 5px;
    font-size: 22px;
    color: #333;
}

/* CONTROLS */
.controls {
    text-align: center;
    padding: 15px;
    background: #ffffff;
    margin: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

input {
    padding: 6px;
    margin: 5px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    background: #6a9c89;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #588a76;
}

/* KARTA BLOCK */
.karta-block {
    background: #ffffff;
    margin: 20px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.karta-title {
    font-size: 18px;
    font-weight: bold;
    color: #2f4f4f;
    border-bottom: 2px solid #6a9c89;
    padding-bottom: 5px;
    margin-bottom: 10px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

th {
    background: #6a9c89;
    color: white;
}

#status {
    text-align: center;
    font-weight: bold;
    margin-top: 10px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <!-- Replace this logo URL if you have official one -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Om_symbol.svg/120px-Om_symbol.svg.png" id="logo">
    <h1>Radha Soami Satsang Beas</h1>
    <h3>Satsang Planner</h3>
</div>

<!-- CONTROLS -->
<div class="controls">
Month: <input type="number" id="month" value="5">
Year: <input type="number" id="year" value="2026">
<br><br>
<button onclick="generate()">Generate Schedule</button>
<button onclick="downloadExcel()">Download Excel</button>
</div>

<p id="status"></p>

<div id="output"></div>

<script>

const SHEET_ID = "1EB9C_6xWe_QXzoDR8XT2JSODPafO0bQSR7PFmjv30i4";

async function fetchData(sheet) {
    let url = `https://opensheet.elk.sh/${SHEET_ID}/${sheet}`;
    let res = await fetch(url);
    return await res.json();
}

function getSundays(month, year) {
    let dates = [];
    let d = new Date(year, month - 1, 1);

    while (d.getMonth() === month - 1) {
        if (d.getDay() === 0) dates.push(new Date(d));
        d.setDate(d.getDate() + 1);
    }

    if (dates.length >= 4) dates.splice(3, 1);
    return dates;
}

async function generate() {

    document.getElementById("status").innerText = "Generating...";

    let kartaData = await fetchData("KARTA_BANI");
    let centerData = await fetchData("CENTERS");

    let output = document.getElementById("output");
    output.innerHTML = "";

    let kartaMap = {};

    kartaData.forEach(row => {
        let name = (row.Karta_Name || "").trim();

        if (!kartaMap[name]) kartaMap[name] = [];

        kartaMap[name].push({
            shabad: row.Shabad || "",
            guru: row.Guru || "",
            book: row.Book || "",
            page: row.Page || ""
        });
    });

    let kartas = Object.keys(kartaMap);
    let centers = centerData.map(c => c.Center_Name).filter(Boolean);

    let sundays = getSundays(
        document.getElementById("month").value,
        document.getElementById("year").value
    );

    let schedule = {};

    sundays.forEach(date => {

        let shuffledKartas = [...kartas].sort(() => 0.5 - Math.random());
        let shuffledCenters = [...centers].sort(() => 0.5 - Math.random());

        let limit = Math.min(shuffledKartas.length, shuffledCenters.length);

        for (let i = 0; i < limit; i++) {

            let karta = shuffledKartas[i];
            let center = shuffledCenters[i];

            let baniList = kartaMap[karta];
            let bani = baniList[Math.floor(Math.random() * baniList.length)];

            if (!schedule[karta]) schedule[karta] = [];

            schedule[karta].push({
                date: date.toLocaleDateString(),
                center,
                shabad: bani.shabad,
                guru: bani.guru,
                book: bani.book,
                page: bani.page
            });
        }

    });

    // DISPLAY
    for (let karta in schedule) {

        let block = document.createElement("div");
        block.className = "karta-block";

        let title = `<div class="karta-title">${karta}</div>`;

        let table = `<table>
        <tr>
        <th>Date</th>
        <th>Center</th>
        <th>Shabad</th>
        <th>Guru</th>
        <th>Book</th>
        <th>Page</th>
        </tr>`;

        schedule[karta].forEach(row => {
            table += `<tr>
            <td>${row.date}</td>
            <td>${row.center}</td>
            <td>${row.shabad}</td>
            <td>${row.guru}</td>
            <td>${row.book}</td>
            <td>${row.page}</td>
            </tr>`;
        });

        table += "</table>";

        block.innerHTML = title + table;
        output.appendChild(block);
    }

    document.getElementById("status").innerText = "✅ Schedule Generated";
}

function downloadExcel() {
    let html = document.getElementById("output").innerHTML;

    let blob = new Blob([html], {
        type: "application/vnd.ms-excel"
    });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Satsang_Planner.xls";
    link.click();
}

</script>

</body>
</html>
