<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Satsang Planner</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
h2 { text-align: center; }

.controls { text-align: center; margin-bottom: 20px; }

button {
    padding: 10px;
    margin: 5px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
}

.karta-block {
    background: white;
    margin: 15px 0;
    padding: 10px;
    border-radius: 8px;
}

.karta-title {
    background: #4CAF50;
    color: white;
    padding: 8px;
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

td, th {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
}

th { background: #ddd; }

#status { text-align: center; font-weight: bold; }
</style>

</head>

<body>

<h2>🕉️ Satsang Planner</h2>

<div class="controls">
Month: <input type="number" id="month" value="5">
Year: <input type="number" id="year" value="2026">
<br><br>
<button onclick="generate()">Generate Schedule</button>
<button onclick="downloadExcel()">Download Excel</button>
</div>

<p id="status"></p>

<div id="output"></div>

<script>

const SHEET_ID = "1EB9C_6xWe_QXzoDR8XT2JSODPafO0bQSR7PFmjv30i4";

async function fetchData(sheet) {
    let url = `https://opensheet.elk.sh/${SHEET_ID}/${sheet}`;
    let res = await fetch(url);
    return await res.json();
}

function getSundays(month, year) {
    let dates = [];
    let d = new Date(year, month - 1, 1);

    while (d.getMonth() === month - 1) {
        if (d.getDay() === 0) dates.push(new Date(d));
        d.setDate(d.getDate() + 1);
    }

    if (dates.length >= 4) dates.splice(3, 1);
    return dates;
}

async function generate() {

    document.getElementById("status").innerText = "Generating...";

    let kartaData = await fetchData("KARTA_BANI");
    let centerData = await fetchData("CENTERS");

    let output = document.getElementById("output");
    output.innerHTML = "";

    let kartaMap = {};

    // Build karta data
    kartaData.forEach(row => {
        let name = (row.Karta_Name || "").trim();
        if (!name) return;

        if (!kartaMap[name]) kartaMap[name] = [];

        kartaMap[name].push({
            shabad: row.Shabad || "",
            guru: row.Guru || "",
            book: row.Book || "",
            page: row.Page || ""
        });
    });

    let kartas = Object.keys(kartaMap);
    let centers = centerData.map(c => c.Center_Name).filter(Boolean);

    let sundays = getSundays(
        document.getElementById("month").value,
        document.getElementById("year").value
    );

    let schedule = {};

    sundays.forEach(date => {

        let shuffledKartas = [...kartas].sort(() => 0.5 - Math.random());
        let shuffledCenters = [...centers].sort(() => 0.5 - Math.random());

        let limit = Math.min(shuffledKartas.length, shuffledCenters.length);

        for (let i = 0; i < limit; i++) {

            let karta = shuffledKartas[i];
            let center = shuffledCenters[i];

            let baniList = kartaMap[karta];
            let bani = baniList[Math.floor(Math.random() * baniList.length)];

            if (!schedule[karta]) schedule[karta] = [];

            schedule[karta].push({
                date: date.toLocaleDateString(),
                center,
                shabad: bani.shabad || "",
                guru: bani.guru || "",
                book: bani.book || "",
                page: bani.page || ""
            });
        }

    });

    // DISPLAY GROUPED
    for (let karta in schedule) {

        let block = document.createElement("div");
        block.className = "karta-block";

        let title = `<div class="karta-title">${karta}</div>`;

        let table = `<table>
        <tr>
        <th>Date</th>
        <th>Center</th>
        <th>Shabad</th>
        <th>Guru</th>
        <th>Book</th>
        <th>Page</th>
        </tr>`;

        schedule[karta].forEach(row => {
            table += `<tr>
            <td>${row.date}</td>
            <td>${row.center}</td>
            <td>${row.shabad}</td>
            <td>${row.guru}</td>
            <td>${row.book}</td>
            <td>${row.page}</td>
            </tr>`;
        });

        table += "</table>";

        block.innerHTML = title + table;
        output.appendChild(block);
    }

    document.getElementById("status").innerText = "✅ Grouped Schedule Generated";
}

function downloadExcel() {
    let html = document.getElementById("output").innerHTML;

    let blob = new Blob([html], {
        type: "application/vnd.ms-excel"
    });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Satsang_Grouped.xls";
    link.click();
}

</script>

</body>
</html>
