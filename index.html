<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Satsang Planner</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

h2 {
    text-align: center;
}

.controls {
    text-align: center;
    margin-bottom: 20px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    background-color: #4CAF50;
    color: white;
}

button:hover {
    background-color: #45a049;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th {
    background-color: #4CAF50;
    color: white;
}

#status {
    text-align: center;
    margin: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<h2>🕉️ Satsang Planner</h2>

<div class="controls">
Month: <input type="number" id="month" value="4">
Year: <input type="number" id="year" value="2026">
<br><br>
<button onclick="generate()">Generate Schedule</button>
<button onclick="downloadExcel()">Download Excel</button>
</div>

<p id="status"></p>

<table id="table">
<thead>
<tr>
<th>S.No</th>
<th>Date</th>
<th>Time</th>
<th>Center</th>
<th>Karta</th>
<th>Mobile</th>
<th>Shabad</th>
<th>Guru</th>
<th>Book</th>
<th>Page</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const SHEET_ID = "1EB9C_6xWe_QXzoDR8XT2JSODPafO0bQSR7PFmjv30i4";

async function fetchData(sheet) {
    try {
        let url = `https://opensheet.elk.sh/${SHEET_ID}/${sheet}`;
        let res = await fetch(url);
        return await res.json();
    } catch {
        document.getElementById("status").innerText = "❌ Error loading data";
        return [];
    }
}

function getSundays(month, year) {
    let dates = [];
    let d = new Date(year, month - 1, 1);

    while (d.getMonth() === month - 1) {
        if (d.getDay() === 0) dates.push(new Date(d));
        d.setDate(d.getDate() + 1);
    }

    if (dates.length >= 4) dates.splice(3, 1);

    return dates;
}

async function generate() {

    document.getElementById("status").innerText = "Loading data...";

    let kartaData = await fetchData("KARTA_BANI");
    let centerData = await fetchData("CENTERS");

    if (!kartaData.length || !centerData.length) {
        document.getElementById("status").innerText = "❌ Data not found. Check sheet names.";
        return;
    }

    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    let kartaMap = {};

    // Build karta map
    kartaData.forEach(row => {
        let name = (row.Karta_Name || "").trim();
        if (!name) return;

        if (!kartaMap[name]) {
            kartaMap[name] = [];
        }

        kartaMap[name].push({
            shabad: (row.Shabad || "").trim(),
            mobile: (row.Mobile || "").trim(),
            guru: (row.Guru || "").trim(),
            book: (row.Book || "").trim(),
            page: (row.Page || "").trim()
        });
    });

    let kartas = Object.keys(kartaMap);

    let centers = centerData
        .map(c => (c.Center_Name || "").trim())
        .filter(c => c !== "");

    if (kartas.length === 0 || centers.length === 0) {
        document.getElementById("status").innerText = "❌ Data format issue";
        return;
    }

    let sundays = getSundays(
        document.getElementById("month").value,
        document.getElementById("year").value
    );

    let rowCount = 1;
    let centerHistory = {};

    sundays.forEach(date => {

        // Shuffle kartas for fairness
        let shuffledKartas = [...kartas].sort(() => 0.5 - Math.random());

        centers.forEach((center, i) => {

            let karta = shuffledKartas[i % shuffledKartas.length];
            let baniList = kartaMap[karta];

            if (!baniList || baniList.length === 0) return;

            let bani = baniList[Math.floor(Math.random() * baniList.length)];

            // Prevent immediate repeat of center for same karta
            if (centerHistory[karta] === center) {
                let alt = centers.find(c => c !== center);
                if (alt) center = alt;
            }

            centerHistory[karta] = center;

            let row = `<tr>
            <td>${rowCount++}</td>
            <td>${date.toLocaleDateString()}</td>
            <td>9:30 AM</td>
            <td>${center}</td>
            <td>${karta}</td>
            <td>${bani.mobile}</td>
            <td>${bani.shabad}</td>
            <td>${bani.guru}</td>
            <td>${bani.book}</td>
            <td>${bani.page}</td>
            </tr>`;

            tbody.innerHTML += row;
        });

    });

    document.getElementById("status").innerText = "✅ Full Schedule Generated";
}

function downloadExcel() {
    let table = document.getElementById("table").outerHTML;

    let blob = new Blob([table], {
        type: "application/vnd.ms-excel"
    });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Satsang_Planner.xls";
    link.click();
}

</script>

</body>
</html>
