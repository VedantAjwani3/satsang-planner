<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Satsang Planner</title>

<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
h2 { text-align: center; }

.controls { text-align: center; margin-bottom: 20px; }

button {
    padding: 10px;
    margin: 5px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: white;
}

td, th {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
}

th { background: #4CAF50; color: white; }

#status { text-align: center; font-weight: bold; }
</style>
</head>

<body>

<h2>🕉️ Satsang Planner</h2>

<div class="controls">
Month: <input type="number" id="month" value="5">
Year: <input type="number" id="year" value="2026">
<br><br>
<button onclick="generate()">Generate Schedule</button>
<button onclick="downloadExcel()">Download Excel</button>
</div>

<p id="status"></p>

<table id="table">
<thead>
<tr>
<th>S.No</th>
<th>Date</th>
<th>Center</th>
<th>Karta</th>
<th>Shabad</th>
<th>Guru</th>
<th>Book</th>
<th>Page</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const SHEET_ID = "1EB9C_6xWe_QXzoDR8XT2JSODPafO0bQSR7PFmjv30i4";

async function fetchData(sheet) {
    let url = `https://opensheet.elk.sh/${SHEET_ID}/${sheet}`;
    let res = await fetch(url);
    return await res.json();
}

function getSundays(month, year) {
    let dates = [];
    let d = new Date(year, month - 1, 1);

    while (d.getMonth() === month - 1) {
        if (d.getDay() === 0) dates.push(new Date(d));
        d.setDate(d.getDate() + 1);
    }

    if (dates.length >= 4) dates.splice(3, 1);
    return dates;
}

async function generate() {

    document.getElementById("status").innerText = "Generating...";

    let kartaData = await fetchData("KARTA_BANI");
    let centerData = await fetchData("CENTERS");

    let tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    let kartaMap = {};

    kartaData.forEach(row => {
        let name = row.Karta_Name?.trim();
        if (!name) return;

        if (!kartaMap[name]) kartaMap[name] = [];

        kartaMap[name].push({
            shabad: row.Shabad || "",
            guru: row.Guru || "",
            book: row.Book || "",
            page: row.Page || ""
        });
    });

    let kartas = Object.keys(kartaMap);
    let centers = centerData.map(c => c.Center_Name).filter(Boolean);

    let sundays = getSundays(
        document.getElementById("month").value,
        document.getElementById("year").value
    );

    let rowCount = 1;

    sundays.forEach(date => {

        let shuffledKartas = [...kartas].sort(() => 0.5 - Math.random());

        centers.forEach((center, i) => {

            let karta = shuffledKartas[i];

            let bani = null;

            if (karta) {
                let list = kartaMap[karta];
                bani = list[Math.floor(Math.random() * list.length)];
            }

            let row = `<tr>
            <td>${rowCount++}</td>
            <td>${date.toLocaleDateString()}</td>
            <td>${center}</td>
            <td>${karta || "—"}</td>
            <td>${bani ? bani.shabad : "—"}</td>
            <td>${bani ? bani.guru : "—"}</td>
            <td>${bani ? bani.book : "—"}</td>
            <td>${bani ? bani.page : "—"}</td>
            </tr>`;

            tbody.innerHTML += row;
        });

    });

    document.getElementById("status").innerText = "✅ Schedule Generated (Remaining centers empty)";
}

function downloadExcel() {
    let table = document.getElementById("table").outerHTML;

    let blob = new Blob([table], {
        type: "application/vnd.ms-excel"
    });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Satsang_Planner.xls";
    link.click();
}

</script>

</body>
</html>
